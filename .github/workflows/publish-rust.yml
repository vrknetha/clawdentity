name: Publish Rust

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Semantic version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      draft:
        description: "Create GitHub release as draft"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark GitHub release as prerelease"
        required: false
        default: false
        type: boolean

concurrency:
  group: publish-rust-release
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Resolve next Rust version
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.version.outputs.current_version }}
      next_version: ${{ steps.version.outputs.next_version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate required secrets
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          test -n "${CARGO_REGISTRY_TOKEN}"

      - name: Resolve current and next crate version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TYPE="${{ inputs.release_type }}"
          if CARGO_TERM_COLOR=never cargo info clawdentity-core --registry crates-io >/tmp/core-info.out 2>/tmp/core-info.err; then
            CURRENT_VERSION="$(
              sed -E 's/\x1B\[[0-9;]*[mK]//g' /tmp/core-info.out \
                | awk -F': ' '/^version: / {print $2; exit}'
            )"
            if [[ -z "${CURRENT_VERSION}" ]]; then
              echo "Unable to parse version from cargo info output."
              cat /tmp/core-info.out
              exit 1
            fi
          else
            if grep -Fq 'could not find `clawdentity-core`' /tmp/core-info.err; then
              CURRENT_VERSION="0.0.0"
            else
              echo "Failed to resolve current version from crates.io registry index."
              cat /tmp/core-info.err
              exit 1
            fi
          fi

          if [[ ! "${CURRENT_VERSION}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Unable to parse crates.io semver: ${CURRENT_VERSION}"
            exit 1
          fi

          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"

          case "${RELEASE_TYPE}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "Unsupported release_type: ${RELEASE_TYPE}"
              exit 1
              ;;
          esac

          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="rust/v${NEXT_VERSION}"

          git fetch --tags --force origin
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag already exists: ${TAG}"
            exit 1
          fi

          echo "current_version=${CURRENT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "next_version=${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Resolved Rust release: ${CURRENT_VERSION} -> ${NEXT_VERSION} (${RELEASE_TYPE})"

      - name: Assert target versions are unpublished
        shell: bash
        run: |
          set -euo pipefail

          NEXT_VERSION="${{ steps.version.outputs.next_version }}"

          for CRATE in clawdentity-core clawdentity-cli; do
            if CARGO_TERM_COLOR=never cargo info "${CRATE}@${NEXT_VERSION}" --registry crates-io >/tmp/"${CRATE}".out 2>/tmp/"${CRATE}".err; then
              echo "${CRATE} ${NEXT_VERSION} already exists on crates.io"
              exit 1
            fi

            if grep -Fq "could not find \`${CRATE}@${NEXT_VERSION}\`" /tmp/"${CRATE}".err; then
              continue
            fi

            echo "Unexpected error while checking ${CRATE}@${NEXT_VERSION}."
            cat /tmp/"${CRATE}".err
            exit 1
          done

  publish:
    name: Publish Rust crates
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ needs.prepare.outputs.tag }}
      next_version: ${{ needs.prepare.outputs.next_version }}
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch context
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.ref_type }}" != "branch" ]]; then
            echo "Publish workflow must run from a branch ref. Current ref: ${{ github.ref }}"
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update Cargo versions
        shell: bash
        run: |
          set -euo pipefail

          NEXT_VERSION="${{ needs.prepare.outputs.next_version }}"

          sed -i '0,/^version = "[0-9]\+\.[0-9]\+\.[0-9]\+"/s//version = "'"${NEXT_VERSION}"'"/' crates/clawdentity-core/Cargo.toml
          sed -i '0,/^version = "[0-9]\+\.[0-9]\+\.[0-9]\+"/s//version = "'"${NEXT_VERSION}"'"/' crates/clawdentity-cli/Cargo.toml
          sed -i 's|^clawdentity-core = { version = "[0-9]\+\.[0-9]\+\.[0-9]\+", path = "../clawdentity-core" }|clawdentity-core = { version = "'"${NEXT_VERSION}"'", path = "../clawdentity-core" }|' crates/clawdentity-cli/Cargo.toml

          grep -n '^version = "' crates/clawdentity-core/Cargo.toml | head -n 1
          grep -n '^version = "' crates/clawdentity-cli/Cargo.toml | head -n 1
          grep -n '^clawdentity-core = { version = "' crates/clawdentity-cli/Cargo.toml

      - name: Cargo check
        working-directory: crates
        run: cargo check -p clawdentity-core -p clawdentity-cli

      - name: Commit release version and create tag
        shell: bash
        run: |
          set -euo pipefail

          NEXT_VERSION="${{ needs.prepare.outputs.next_version }}"
          TAG="${{ needs.prepare.outputs.tag }}"

          git add crates/clawdentity-core/Cargo.toml crates/clawdentity-cli/Cargo.toml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 1
          fi

          git commit -m "chore(rust): release v${NEXT_VERSION}"
          git tag -a "${TAG}" -m "Rust release ${TAG}"

      - name: Push commit and tag
        shell: bash
        run: |
          set -euo pipefail
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "refs/tags/${{ needs.prepare.outputs.tag }}"

      - name: Publish clawdentity-core
        working-directory: crates
        run: cargo publish -p clawdentity-core --locked

      - name: Wait for clawdentity-core index propagation
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.prepare.outputs.next_version }}"
          ATTEMPTS=40
          SLEEP_SECONDS=10

          for ((i = 1; i <= ATTEMPTS; i++)); do
            if CARGO_TERM_COLOR=never cargo info "clawdentity-core@${VERSION}" --registry crates-io >/tmp/core-propagation.out 2>/tmp/core-propagation.err; then
              echo "clawdentity-core ${VERSION} is available on crates.io"
              exit 0
            fi

            if ! grep -Fq "could not find \`clawdentity-core@${VERSION}\`" /tmp/core-propagation.err; then
              echo "Unexpected error while waiting for clawdentity-core ${VERSION}."
              cat /tmp/core-propagation.err
              exit 1
            fi

            echo "Waiting for clawdentity-core ${VERSION} propagation (${i}/${ATTEMPTS})"
            sleep "${SLEEP_SECONDS}"
          done

          echo "Timed out waiting for clawdentity-core ${VERSION} on crates.io"
          exit 1

      - name: Publish clawdentity-cli
        working-directory: crates
        run: cargo publish -p clawdentity-cli --locked

  build-binaries:
    name: Build ${{ matrix.platform }}
    needs: publish
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: "false"
            smoke_test: "true"
          - os: ubuntu-latest
            platform: linux-aarch64
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: "true"
            smoke_test: "false"
          - os: macos-14
            platform: macos-x86_64
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            use_cross: "false"
            smoke_test: "false"
          - os: macos-14
            platform: macos-aarch64
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            use_cross: "false"
            smoke_test: "true"
          - os: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            use_cross: "false"
            smoke_test: "true"
          - os: windows-latest
            platform: windows-aarch64
            target: aarch64-pc-windows-msvc
            archive_ext: zip
            use_cross: "false"
            smoke_test: "false"
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.publish.outputs.tag }}
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64 build)
        if: matrix.use_cross == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build clawdentity-cli
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build \
              --manifest-path crates/Cargo.toml \
              --release \
              -p clawdentity-cli \
              --target "${{ matrix.target }}"
          else
            cargo build \
              --manifest-path crates/Cargo.toml \
              --release \
              -p clawdentity-cli \
              --target "${{ matrix.target }}"
          fi

      # only execute smoke tests when runner architecture matches target architecture
      - name: Smoke test binary (Unix)
        if: runner.os != 'Windows' && matrix.smoke_test == 'true'
        shell: bash
        run: |
          set -euo pipefail
          BIN="crates/target/${{ matrix.target }}/release/clawdentity-cli"
          "${BIN}" --version

      - name: Smoke test binary (Windows)
        if: runner.os == 'Windows' && matrix.smoke_test == 'true'
        shell: pwsh
        run: |
          $bin = "crates/target/${{ matrix.target }}/release/clawdentity-cli.exe"
          & $bin --version

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.publish.outputs.next_version }}"
          PLATFORM="${{ matrix.platform }}"
          ASSET_BASE="clawdentity-${VERSION}-${PLATFORM}"
          STAGE_DIR="dist/${ASSET_BASE}"
          ARCHIVE_PATH="dist/${ASSET_BASE}.tar.gz"

          mkdir -p "${STAGE_DIR}"
          install -m 0755 "crates/target/${{ matrix.target }}/release/clawdentity-cli" "${STAGE_DIR}/clawdentity"
          cp README.md LICENSE "${STAGE_DIR}/"
          tar -C "${STAGE_DIR}" -czf "${ARCHIVE_PATH}" .

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.publish.outputs.next_version }}"
          $platform = "${{ matrix.platform }}"
          $assetBase = "clawdentity-$version-$platform"
          $stageDir = "dist/$assetBase"
          $archivePath = "dist/$assetBase.zip"

          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item "crates/target/${{ matrix.target }}/release/clawdentity-cli.exe" "$stageDir/clawdentity.exe"
          Copy-Item "README.md", "LICENSE" $stageDir
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }
          Compress-Archive -Path "$stageDir/*" -DestinationPath $archivePath

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/clawdentity-${{ needs.publish.outputs.next_version }}-${{ matrix.platform }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub release assets
    needs:
      - publish
      - build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.publish.outputs.tag }}
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Stage installer scripts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          install -m 0755 apps/landing/public/install.sh dist/install.sh
          install -m 0644 apps/landing/public/install.ps1 dist/install.ps1

      - name: Verify assets and generate checksums
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.publish.outputs.next_version }}"
          CHECKSUM_PATH="dist/clawdentity-${VERSION}-checksums.txt"

          mapfile -t ARCHIVES < <(find dist -maxdepth 1 -type f \
            \( -name "clawdentity-${VERSION}-*.tar.gz" -o -name "clawdentity-${VERSION}-*.zip" \) \
            | sort)

          if [[ "${#ARCHIVES[@]}" -ne 6 ]]; then
            echo "Expected 6 release archives, found ${#ARCHIVES[@]}"
            ls -lah dist
            exit 1
          fi

          sha256sum "${ARCHIVES[@]}" > "${CHECKSUM_PATH}"

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          NOTES_PATH="dist/release-notes.md"
          cat > "${NOTES_PATH}" <<'EOF'
          ## Clawdentity Rust CLI binaries

          Assets in this release:
          - Linux: x86_64 and aarch64
          - macOS: x86_64 and aarch64
          - Windows: x86_64 and aarch64 (`clawdentity.exe`)
          - Installers: `install.sh` and `install.ps1`
          - SHA256 checksums: `clawdentity-<version>-checksums.txt`

          Windows install example (PowerShell + `irm`):

          ```powershell
          $tag = "rust/vX.Y.Z"
          $version = "X.Y.Z"
          $asset = "clawdentity-$version-windows-x86_64.zip"
          $url = "https://github.com/vrknetha/clawdentity/releases/download/$tag/$asset"

          irm $url -OutFile $asset
          Expand-Archive -Path $asset -DestinationPath ".\\clawdentity-bin" -Force

          # Move clawdentity.exe to a folder on PATH (example)
          New-Item -ItemType Directory -Force -Path "$HOME\\bin" | Out-Null
          Move-Item ".\\clawdentity-bin\\clawdentity.exe" "$HOME\\bin\\clawdentity.exe" -Force
          ```
          EOF

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: dist/clawdentity-${{ needs.publish.outputs.next_version }}-checksums.txt
          if-no-files-found: error

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.publish.outputs.tag }}
          name: Clawdentity Rust CLI v${{ needs.publish.outputs.next_version }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          body_path: dist/release-notes.md
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/clawdentity-${{ needs.publish.outputs.next_version }}-linux-x86_64.tar.gz
            dist/clawdentity-${{ needs.publish.outputs.next_version }}-linux-aarch64.tar.gz
            dist/clawdentity-${{ needs.publish.outputs.next_version }}-macos-x86_64.tar.gz
            dist/clawdentity-${{ needs.publish.outputs.next_version }}-macos-aarch64.tar.gz
            dist/clawdentity-${{ needs.publish.outputs.next_version }}-windows-x86_64.zip
            dist/clawdentity-${{ needs.publish.outputs.next_version }}-windows-aarch64.zip
            dist/clawdentity-${{ needs.publish.outputs.next_version }}-checksums.txt
            dist/install.sh
            dist/install.ps1
