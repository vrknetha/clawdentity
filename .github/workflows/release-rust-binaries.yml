name: Release Rust Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (format: rust/vX.Y.Z)"
        required: true
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-rust-binaries-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format and existence
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ inputs.tag }}"
          if [[ ! "${TAG}" =~ ^rust/v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Invalid tag '${TAG}'. Expected format: rust/vX.Y.Z"
            exit 1
          fi

          git fetch --tags --force origin
          if ! git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag '${TAG}' was not found in origin."
            exit 1
          fi

          VERSION="${TAG#rust/v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: "false"
          - os: ubuntu-latest
            platform: linux-aarch64
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: "true"
          - os: macos-13
            platform: macos-x86_64
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            use_cross: "false"
          - os: macos-14
            platform: macos-aarch64
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            use_cross: "false"
          - os: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            use_cross: "false"
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64 build)
        if: matrix.use_cross == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build clawdentity-cli
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build \
              --manifest-path crates/Cargo.toml \
              --release \
              -p clawdentity-cli \
              --target "${{ matrix.target }}"
          else
            cargo build \
              --manifest-path crates/Cargo.toml \
              --release \
              -p clawdentity-cli \
              --target "${{ matrix.target }}"
          fi

      - name: Smoke test binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN="crates/target/${{ matrix.target }}/release/clawdentity-cli"
          "${BIN}" --version

      - name: Smoke test binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "crates/target/${{ matrix.target }}/release/clawdentity-cli.exe"
          & $bin --version

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          ASSET_BASE="clawdentity-${VERSION}-${PLATFORM}"
          STAGE_DIR="dist/${ASSET_BASE}"
          ARCHIVE_PATH="dist/${ASSET_BASE}.tar.gz"

          mkdir -p "${STAGE_DIR}"
          install -m 0755 "crates/target/${{ matrix.target }}/release/clawdentity-cli" "${STAGE_DIR}/clawdentity"
          cp README.md LICENSE "${STAGE_DIR}/"
          tar -C "${STAGE_DIR}" -czf "${ARCHIVE_PATH}" .

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $platform = "${{ matrix.platform }}"
          $assetBase = "clawdentity-$version-$platform"
          $stageDir = "dist/$assetBase"
          $archivePath = "dist/$assetBase.zip"

          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item "crates/target/${{ matrix.target }}/release/clawdentity-cli.exe" "$stageDir/clawdentity.exe"
          Copy-Item "README.md", "LICENSE" $stageDir
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }
          Compress-Archive -Path "$stageDir/*" -DestinationPath $archivePath

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/clawdentity-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub release assets
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Verify assets and generate checksums
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          CHECKSUM_PATH="dist/clawdentity-${VERSION}-checksums.txt"

          mapfile -t ARCHIVES < <(find dist -maxdepth 1 -type f \
            \( -name "clawdentity-${VERSION}-*.tar.gz" -o -name "clawdentity-${VERSION}-*.zip" \) \
            | sort)

          if [[ "${#ARCHIVES[@]}" -ne 5 ]]; then
            echo "Expected 5 release archives, found ${#ARCHIVES[@]}"
            ls -lah dist
            exit 1
          fi

          sha256sum "${ARCHIVES[@]}" > "${CHECKSUM_PATH}"

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          NOTES_PATH="dist/release-notes.md"
          cat > "${NOTES_PATH}" <<'EOF'
          ## Clawdentity Rust CLI binaries

          Assets in this release:
          - Linux: x86_64 and aarch64
          - macOS: x86_64 and aarch64
          - Windows: x86_64 (`clawdentity.exe`)
          - SHA256 checksums: `clawdentity-<version>-checksums.txt`

          Windows install example (PowerShell + `irm`):

          ```powershell
          $tag = "rust/vX.Y.Z"
          $version = "X.Y.Z"
          $asset = "clawdentity-$version-windows-x86_64.zip"
          $url = "https://github.com/vrknetha/clawdentity/releases/download/$tag/$asset"

          irm $url -OutFile $asset
          Expand-Archive -Path $asset -DestinationPath ".\\clawdentity-bin" -Force

          # Move clawdentity.exe to a folder on PATH (example)
          New-Item -ItemType Directory -Force -Path "$HOME\\bin" | Out-Null
          Move-Item ".\\clawdentity-bin\\clawdentity.exe" "$HOME\\bin\\clawdentity.exe" -Force
          ```
          EOF

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: dist/clawdentity-${{ needs.prepare.outputs.version }}-checksums.txt
          if-no-files-found: error

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Clawdentity Rust CLI v${{ needs.prepare.outputs.version }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          body_path: dist/release-notes.md
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/clawdentity-${{ needs.prepare.outputs.version }}-linux-x86_64.tar.gz
            dist/clawdentity-${{ needs.prepare.outputs.version }}-linux-aarch64.tar.gz
            dist/clawdentity-${{ needs.prepare.outputs.version }}-macos-x86_64.tar.gz
            dist/clawdentity-${{ needs.prepare.outputs.version }}-macos-aarch64.tar.gz
            dist/clawdentity-${{ needs.prepare.outputs.version }}-windows-x86_64.zip
            dist/clawdentity-${{ needs.prepare.outputs.version }}-checksums.txt
