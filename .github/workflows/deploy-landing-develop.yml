name: Deploy Landing Site (Develop)

on:
  push:
    branches: [develop]
    paths:
      - "apps/landing/**"
      - "apps/agent-skill/skill/**"
      - "apps/landing/scripts/**"
      - ".github/workflows/deploy-landing*.yml"
  workflow_dispatch:

concurrency:
  group: deploy-landing-develop
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install D2 CLI
        run: curl -fsSL https://d2lang.com/install.sh | sh -s --

      - run: pnpm install --frozen-lockfile

      - name: Verify Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "Missing required secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Missing required secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Bootstrap Cloudflare Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          PROJECT_NAME="clawdentity-site-dev"

          PROJECTS_JSON="$(pnpm dlx wrangler@4 pages project list --json)"
          if PROJECTS_JSON="${PROJECTS_JSON}" node - "${PROJECT_NAME}" <<'NODE'
          const projectName = process.argv[2];
          const projects = JSON.parse(process.env.PROJECTS_JSON ?? "[]");
          const exists =
            Array.isArray(projects) &&
            projects.some((project) => {
              const name =
                project?.name ??
                project?.["Project Name"] ??
                project?.project_name ??
                null;
              return name === projectName;
            });
          process.exit(exists ? 0 : 1);
          NODE
          then
            echo "Cloudflare Pages project '${PROJECT_NAME}' already exists"
          else
            echo "Creating Cloudflare Pages project '${PROJECT_NAME}' with production branch 'develop'"
            pnpm dlx wrangler@4 pages project create "${PROJECT_NAME}" --production-branch develop
          fi

      - run: pnpm --filter @clawdentity/landing build

      - name: Assert landing artifacts exist
        run: |
          set -euo pipefail
          test -f apps/landing/dist/agent-skill.md
          test -f apps/landing/dist/skill.md
          test -f apps/landing/dist/install.sh
          test -f apps/landing/dist/install.ps1

      - name: Deploy to Cloudflare Pages (develop)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/landing/dist --project-name=clawdentity-site-dev --branch=develop

      - name: Verify develop onboarding URLs
        run: |
          python3 - <<'PY'
          import sys, time, urllib.request

          urls = [
              "https://clawdentity-site-dev.pages.dev/",
              "https://clawdentity-site-dev.pages.dev/agent-skill.md",
              "https://clawdentity-site-dev.pages.dev/skill.md",
              "https://clawdentity-site-dev.pages.dev/install.sh",
              "https://clawdentity-site-dev.pages.dev/install.ps1",
          ]

          for url in urls:
              last_error = None
              for attempt in range(1, 13):
                  try:
                      req = urllib.request.Request(
                          url,
                          headers={
                              "Cache-Control": "no-cache",
                              "User-Agent": "Clawdentity-CI/1.0",
                          },
                      )
                      with urllib.request.urlopen(req, timeout=10) as response:
                          if response.status != 200:
                              raise RuntimeError(f"{url} returned {response.status}")
                      print(f"url check passed for {url} on attempt {attempt}")
                      break
                  except Exception as exc:
                      last_error = exc
                      sys.stderr.write(f"{url} attempt {attempt}/12 failed: {exc}\n")
                      if attempt == 12:
                          raise SystemExit(f"develop onboarding url verification failed for {url}: {last_error}")
                      time.sleep(10)
          PY
