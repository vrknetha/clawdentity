<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Option A: Shield Claw - Lobster claw holding/forming a shield -->
  
  <!-- Shield body -->
  <path d="M256 56 L420 120 L420 280 Q420 400 256 472 Q92 400 92 280 L92 120 Z" 
        fill="#CC2222" opacity="0.15" stroke="#CC2222" stroke-width="8"/>
  
  <!-- Inner shield highlight -->
  <path d="M256 88 L392 142 L392 272 Q392 376 256 440 Q120 376 120 272 L120 142 Z" 
        fill="none" stroke="#CC2222" stroke-width="3" opacity="0.4"/>

  <!-- Left claw pincer -->
  <path d="M160 200 
           Q130 170 140 140 
           Q150 110 180 105 
           Q210 100 230 120 
           L250 145 
           Q240 160 225 168
           L210 175
           Q190 165 175 175
           Q160 185 160 200Z" 
        fill="#CC2222" stroke="#991111" stroke-width="3"/>
  
  <!-- Right claw pincer -->
  <path d="M352 200 
           Q382 170 372 140 
           Q362 110 332 105 
           Q302 100 282 120 
           L262 145 
           Q272 160 287 168
           L302 175
           Q322 165 337 175
           Q352 185 352 200Z" 
        fill="#CC2222" stroke="#991111" stroke-width="3"/>
  
  <!-- Claw joint/body connecting the pincers -->
  <path d="M200 200 
           Q210 220 230 230 
           L256 240 
           L282 230 
           Q302 220 312 200
           L320 215
           Q310 250 280 265
           L256 278
           L232 265
           Q202 250 192 215Z" 
        fill="#DD3333" stroke="#991111" stroke-width="2.5"/>
  
  <!-- Claw arm/body -->
  <path d="M220 265 
           Q230 290 245 310 
           L256 325
           L267 310
           Q282 290 292 265
           L280 260
           Q270 285 256 300
           Q242 285 232 260Z" 
        fill="#BB2222" stroke="#991111" stroke-width="2"/>

  <!-- Keyhole on shield -->
  <circle cx="256" cy="355" r="18" fill="#CC2222" opacity="0.8"/>
  <rect x="250" y="365" width="12" height="28" rx="3" fill="#CC2222" opacity="0.8"/>
  
  <!-- Keyhole inner (will show background) -->
  <circle cx="256" cy="355" r="10" fill="white" opacity="0.2"/>
  <rect x="252" y="361" width="8" height="20" rx="2" fill="white" opacity="0.2"/>

  <!-- Small checkmark inside shield top area -->
  <path d="M240 340 L252 355 L275 328" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>
</svg>
